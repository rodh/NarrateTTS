<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { width: 320px; padding: 12px; font-family: -apple-system, sans-serif; background: #1a1a1a; color: #e5e5e5; margin: 0; }
        h3 { margin: 0 0 4px; font-size: 14px; }
        .meta { font-size: 11px; color: #888; margin-bottom: 10px; }
        button { width: 100%; padding: 8px; border: none; border-radius: 6px; background: #333; color: white; font-size: 13px; cursor: pointer; }
        button:hover { background: #444; }
        button:disabled { opacity: 0.5; cursor: default; }
        .status { font-size: 12px; color: #22c55e; margin-top: 8px; text-align: center; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h3 id="title">Loading...</h3>
    <p class="meta" id="meta"></p>
    <button id="convert-btn" onclick="convert()">Save to Audio</button>
    <p class="status" id="status"></p>

    <script src="popup.js"></script>
</body>
</html>
