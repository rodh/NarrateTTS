<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
            --bg-button: #e5e7eb;
            --bg-button-hover: #d1d5db;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --text: #e5e5e5;
                --text-muted: #888888;
                --bg-button: #333333;
                --bg-button-hover: #444444;
            }
        }
        body { width: 320px; padding: 12px; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        h3 { margin: 0 0 4px; font-size: 14px; }
        .meta { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
        button { width: 100%; padding: 8px; border: none; border-radius: 6px; background: var(--bg-button); color: var(--text); font-size: 13px; cursor: pointer; }
        button:hover { background: var(--bg-button-hover); }
        button:disabled { opacity: 0.5; cursor: default; }
        .status { font-size: 12px; color: #22c55e; margin-top: 8px; text-align: center; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h3 id="title">Loading...</h3>
    <p class="meta" id="meta"></p>
    <button id="convert-btn" onclick="convert()">Save to Audio</button>
    <p class="status" id="status"></p>

    <script src="popup.js"></script>
</body>
</html>
