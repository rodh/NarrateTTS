<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NarrateTTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        html { height: 100%; }
        body { background: #0f0f0f; color: #e5e5e5; }
        .item-card { transition: background 0.15s; }
        .item-card:hover { background: #1a1a1a; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .status-queued { color: #f59e0b; }
        .status-processing { color: #3b82f6; }
        .status-completed { color: #22c55e; }
        .status-error { color: #ef4444; }
        .progress-bar {
            height: 2px;
            border-radius: 1px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="flex flex-col overflow-hidden" style="height:100dvh">

    <!-- Header -->
    <header class="flex items-center justify-between px-4 sm:px-6 py-3 border-b border-gray-800 relative">
        <h1 class="text-lg font-semibold tracking-tight">NarrateTTS</h1>
        <div class="flex items-center gap-2">
            <input id="search" type="text" placeholder="Search..." class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm w-36 sm:w-48 focus:outline-none focus:border-gray-500">
            <button onclick="toggleAddPanel()" id="add-btn" class="w-8 h-8 flex items-center justify-center rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14m-7-7h14"/></svg>
            </button>
        </div>
    </header>

    <!-- Add Panel (dropdown) -->
    <div id="add-panel" class="hidden border-b border-gray-800 bg-gray-950 px-4 sm:px-6 py-4 overflow-hidden">
        <div class="flex flex-col gap-2 max-w-full">
            <textarea id="url-input" rows="1" placeholder="Paste a URL or text..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-base focus:outline-none focus:border-gray-500 min-w-0 resize-none overflow-hidden leading-normal" oninput="autoResize(this)" onpaste="setTimeout(() => autoResize(this), 0)" onkeydown="handleInputKey(event)"></textarea>
            <div class="flex gap-2 min-w-0">
                <select id="voice-select" class="min-w-0 flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-base focus:outline-none focus:border-gray-500">
                    <option value="af_heart" selected>Heart (F)</option>
                </select>
                <button id="convert-btn" onclick="convert()" class="bg-gray-700 hover:bg-gray-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition shrink-0">Convert</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto px-4 sm:px-6 py-4" id="library">
        <!-- Items rendered here -->
    </main>

    <!-- Playback Bar -->
    <div id="player" class="hidden border-t border-gray-800 px-4 sm:px-6 py-3 pb-[calc(0.75rem+env(safe-area-inset-bottom))]">
        <div class="flex items-center gap-3 sm:gap-4">
            <div class="flex items-center gap-1">
                <button onclick="skipBack()" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-white transition flex-shrink-0" title="Back 30s">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.333 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z"/></svg>
                </button>
                <button id="play-btn" onclick="togglePlay()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-black hover:bg-gray-200 transition flex-shrink-0">
                    <svg id="play-icon" class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                    <svg id="pause-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button onclick="skipForward()" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-white transition flex-shrink-0" title="Forward 30s">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.933 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.333-4zM19.933 12.8a1 1 0 000-1.6l-5.334-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.333-4z"/></svg>
                </button>
            </div>
            <div class="flex-1 min-w-0">
                <p id="player-title" class="text-sm font-medium truncate"></p>
                <div class="flex items-center gap-2 mt-1">
                    <span id="player-time" class="text-xs text-gray-500 flex-shrink-0">0:00</span>
                    <input id="player-progress" type="range" min="0" max="100" value="0" class="flex-1 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-3 [&::-webkit-slider-thumb]:h-3 [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-white" oninput="seekTo(this.value)">
                    <span id="player-duration" class="text-xs text-gray-500 flex-shrink-0">0:00</span>
                </div>
            </div>
            <button id="speed-btn" onclick="cycleSpeed()" class="text-xs text-gray-400 hover:text-white transition flex-shrink-0 px-2 py-1 rounded bg-gray-800 hover:bg-gray-700 min-w-[3rem] text-center" title="Playback speed">1x</button>
        </div>
    </div>

    <script>
        let audio = null;
        let currentItemId = null;
        let items = [];
        let highWaterMark = 0;
        let saveTimeout = null;

        // --- Rendering ---

        async function loadItems() {
            try {
                const res = await fetch('/api/items?limit=100');
                items = await res.json();
            } catch (e) {
                console.error('Failed to load items:', e);
                return;
            }
            render();
        }

        function render() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = items.filter(item =>
                item.title.toLowerCase().includes(query) ||
                (item.source_url && item.source_url.toLowerCase().includes(query))
            );

            const library = document.getElementById('library');
            if (filtered.length === 0) {
                library.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-gray-500">
                        <p class="text-lg mb-1">Nothing here yet</p>
                        <p class="text-sm">Tap + to add a URL or paste text</p>
                    </div>`;
                return;
            }

            library.innerHTML = filtered.map(item => {
                const date = new Date(item.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const pct = (item.duration_seconds > 0) ? ((item.play_position || 0) / item.duration_seconds) : 0;
                const isFinished = pct >= 0.8;
                const isPlaying = currentItemId === item.id && audio && !audio.paused;

                let sourceHtml = '';
                if (item.source_url) {
                    try {
                        const hostname = new URL(item.source_url).hostname.replace('www.', '');
                        sourceHtml = `<a href="${escapeHtml(item.source_url)}" target="_blank" class="text-xs text-gray-500 hover:text-gray-300 truncate max-w-[200px]" onclick="event.stopPropagation()" title="${escapeHtml(item.source_url)}">${hostname}</a>`;
                    } catch(e) {
                        sourceHtml = `<span class="text-xs text-gray-500">Link</span>`;
                    }
                } else {
                    sourceHtml = `<span class="text-xs text-gray-500">Text</span>`;
                }

                // Icon for right side
                let iconHtml = '';
                if (item.status === 'completed' && item.audio_path) {
                    if (isPlaying) {
                        iconHtml = `<span class="text-gray-400"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></span>`;
                    } else if (isFinished) {
                        iconHtml = `<span class="text-green-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>`;
                    } else {
                        iconHtml = `<span class="text-gray-400"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>`;
                    }
                } else if (item.status === 'processing') {
                    iconHtml = `<span class="text-blue-400 text-sm animate-pulse">Converting...</span>`;
                } else if (item.status === 'error') {
                    iconHtml = `<span class="text-red-400 text-xs truncate max-w-[200px]" title="${escapeHtml(item.error || '')}">${escapeHtml(item.error || 'Error')}</span>`;
                }

                // Progress bar
                let progressHtml = '';
                if (item.status === 'completed' && item.duration_seconds > 0 && pct > 0) {
                    const barPct = Math.min(pct * 100, 100);
                    const barColor = isFinished ? 'bg-green-500' : 'bg-gray-500';
                    progressHtml = `<div class="w-full bg-gray-800 rounded-full mt-1.5"><div class="progress-bar ${barColor}" style="width: ${barPct}%"></div></div>`;
                }

                // Row click action
                const audioFile = item.audio_path ? item.audio_path.split('/').pop() : '';
                const rowClick = (item.status === 'completed' && item.audio_path)
                    ? `onclick="playItem(${item.id}, '${audioFile}')"`
                    : '';

                return `
                    <div class="item-card flex flex-col py-3 border-b border-gray-800/50 cursor-pointer" ${rowClick}>
                        <div class="flex items-center gap-3 sm:gap-4">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium truncate">${escapeHtml(item.title)}</p>
                                <div class="flex items-center gap-2 mt-0.5">
                                    ${sourceHtml}
                                    <span class="text-xs text-gray-600">&middot;</span>
                                    <span class="text-xs text-gray-500">${date}</span>
                                    <span class="text-xs text-gray-600">&middot;</span>
                                    <span class="text-xs text-gray-500">${item.word_count || 0} words</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 sm:gap-3 flex-shrink-0">
                                ${iconHtml}
                                ${(item.play_position || 0) > 0 ? `<button onclick="event.stopPropagation(); resetProgress(${item.id})" class="text-gray-600 hover:text-gray-300 transition" title="Reset progress">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5"/><path stroke-linecap="round" stroke-linejoin="round" d="M20.49 9A9 9 0 105.64 5.64L4 4m16 16l-1.64-1.64A9 9 0 0020.49 9"/></svg>
                                </button>` : ''}
                                <button onclick="event.stopPropagation(); deleteItem(${item.id})" class="text-gray-600 hover:text-red-400 transition" title="Delete">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>
                        ${progressHtml}
                    </div>`;
            }).join('');
        }

        // --- Add Panel ---

        function toggleAddPanel() {
            const panel = document.getElementById('add-panel');
            const isHidden = panel.classList.toggle('hidden');
            if (!isHidden) {
                document.getElementById('url-input').focus();
            }
        }

        // --- Conversion ---

        async function convert() {
            const input = document.getElementById('url-input');
            const value = input.value.trim();
            if (!value) return;

            const btn = document.getElementById('convert-btn');
            btn.disabled = true;
            btn.textContent = 'Converting...';

            const voice = document.getElementById('voice-select').value;
            const isUrl = /^https?:\/\//i.test(value);
            const body = isUrl ? { url: value, voice } : { text: value, voice };

            try {
                await fetch('/api/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                input.value = '';
                input.rows = 1;
                input.style.height = '';
                document.getElementById('add-panel').classList.add('hidden');
                pollUpdates();
            } catch (e) {
                alert('Conversion failed: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Convert';
            }
        }

        // --- Playback ---

        function playItem(id, audioFile) {
            if (currentItemId === id && audio) {
                togglePlay();
                return;
            }

            // Save progress from previous item
            if (currentItemId && highWaterMark > 0) {
                saveProgress();
            }

            currentItemId = id;
            if (audio) { audio.pause(); audio = null; }
            audio = new Audio(`/audio/${audioFile}`);
            const speed = getStoredSpeed();
            audio.playbackRate = speed;

            const item = items.find(i => i.id === id);
            highWaterMark = item?.play_position || 0;

            audio.addEventListener('timeupdate', updatePlayerUI);
            audio.addEventListener('ended', () => {
                highWaterMark = audio.duration;
                saveProgress();
                document.getElementById('play-icon').classList.remove('hidden');
                document.getElementById('pause-icon').classList.add('hidden');
                renderPreservingScroll();
            });

            // Resume from saved position
            if (highWaterMark > 0) {
                audio.addEventListener('canplay', function seekOnce() {
                    if (audio.currentTime < highWaterMark) {
                        audio.currentTime = highWaterMark;
                    }
                    audio.removeEventListener('canplay', seekOnce);
                });
            }

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: item ? item.title : '',
                    artist: 'NarrateTTS'
                });
                navigator.mediaSession.setActionHandler('play', () => togglePlay());
                navigator.mediaSession.setActionHandler('pause', () => togglePlay());
                navigator.mediaSession.setActionHandler('seekbackward', () => skipBack());
                navigator.mediaSession.setActionHandler('seekforward', () => skipForward());
            }

            audio.play();
            document.getElementById('player').classList.remove('hidden');
            document.getElementById('player-title').textContent = item ? item.title : '';
            document.getElementById('play-icon').classList.add('hidden');
            document.getElementById('pause-icon').classList.remove('hidden');
            renderPreservingScroll();
        }

        function togglePlay() {
            if (!audio) return;
            if (audio.paused) {
                audio.play();
                document.getElementById('play-icon').classList.add('hidden');
                document.getElementById('pause-icon').classList.remove('hidden');
            } else {
                audio.pause();
                saveProgress();
                document.getElementById('play-icon').classList.remove('hidden');
                document.getElementById('pause-icon').classList.add('hidden');
            }
            renderPreservingScroll();
        }

        function seekTo(value) {
            if (!audio) return;
            audio.currentTime = (value / 100) * audio.duration;
        }

        function skipBack() {
            if (!audio) return;
            audio.currentTime = Math.max(0, audio.currentTime - 30);
        }

        function skipForward() {
            if (!audio) return;
            const newTime = audio.currentTime + 30;
            if (newTime >= audio.duration) {
                audio.currentTime = audio.duration;
            } else {
                audio.currentTime = newTime;
            }
        }

        const SPEED_OPTIONS = [1, 1.25, 1.5, 2, 0.75];

        function getStoredSpeed() {
            const stored = localStorage.getItem('narrateTTS_playbackSpeed');
            const val = parseFloat(stored);
            return (val && SPEED_OPTIONS.includes(val)) ? val : 1;
        }

        function cycleSpeed() {
            const current = getStoredSpeed();
            const idx = SPEED_OPTIONS.indexOf(current);
            const next = SPEED_OPTIONS[(idx + 1) % SPEED_OPTIONS.length];
            localStorage.setItem('narrateTTS_playbackSpeed', next);
            if (audio) audio.playbackRate = next;
            document.getElementById('speed-btn').textContent = next === 1 ? '1x' : next + 'x';
        }

        function updatePlayerUI() {
            if (!audio || !audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('player-progress').value = pct;
            document.getElementById('player-time').textContent = formatTime(audio.currentTime);
            document.getElementById('player-duration').textContent = formatTime(audio.duration);

            if (audio.currentTime > highWaterMark) {
                highWaterMark = audio.currentTime;
                debouncedSaveProgress();
            }
        }

        async function resetProgress(id) {
            try {
                await fetch(`/api/items/${id}/progress`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ position: 0 })
                });
                const item = items.find(i => i.id === id);
                if (item) item.play_position = 0;
                if (currentItemId === id) {
                    highWaterMark = 0;
                    if (audio) audio.currentTime = 0;
                }
                renderPreservingScroll();
            } catch (e) {
                console.error('Reset progress failed:', e);
            }
        }

        async function deleteItem(id) {
            if (!confirm('Delete this item and its audio?')) return;
            try {
                await fetch(`/api/items/${id}`, { method: 'DELETE' });
                if (currentItemId === id) {
                    if (audio) { audio.pause(); audio = null; }
                    currentItemId = null;
                    document.getElementById('player').classList.add('hidden');
                }
                loadItems();
            } catch (e) {
                console.error('Delete failed:', e);
            }
        }

        function saveProgress() {
            if (!currentItemId || highWaterMark <= 0) return;
            const item = items.find(i => i.id === currentItemId);
            if (item && highWaterMark > (item.play_position || 0)) {
                item.play_position = highWaterMark;
            }
            fetch(`/api/items/${currentItemId}/progress`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ position: highWaterMark })
            }).catch(e => console.error('Save progress failed:', e));
        }

        function debouncedSaveProgress() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveProgress, 5000);
        }

        function renderPreservingScroll() {
            const library = document.getElementById('library');
            const scrollTop = library.scrollTop;
            render();
            library.scrollTop = scrollTop;
        }

        // --- Utilities ---

        function autoResize(el) {
            el.style.height = '';
            el.style.height = Math.min(el.scrollHeight, 200) + 'px';
        }

        function handleInputKey(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                const value = event.target.value.trim();
                const isUrl = /^https?:\/\//i.test(value);
                if (isUrl || value.split('\n').length <= 1) {
                    event.preventDefault();
                    convert();
                }
            }
        }

        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // --- Polling ---

        function pollUpdates() {
            loadItems().then(() => {
                // If there are processing items, keep polling
                if (!Array.isArray(items)) return;
                const hasProcessing = items.some(i => i.status === 'processing' || i.status === 'queued');
                if (hasProcessing) {
                    setTimeout(pollUpdates, 3000);
                }
            }).catch(e => {
                console.error('Polling error:', e);
                setTimeout(pollUpdates, 5000);
            });
        }

        // --- Voices ---

        const COMMON_VOICES = [
            { id: "af_heart", name: "Heart (F)" },
            { id: "af_bella", name: "Bella (F)" },
            { id: "af_nicole", name: "Nicole (F)" },
            { id: "af_sarah", name: "Sarah (F)" },
            { id: "af_sky", name: "Sky (F)" },
            { id: "am_adam", name: "Adam (M)" },
            { id: "am_michael", name: "Michael (M)" },
            { id: "bf_emma", name: "Emma (F, UK)" },
            { id: "bf_isabella", name: "Isabella (F, UK)" },
            { id: "bm_george", name: "George (M, UK)" },
            { id: "bm_lewis", name: "Lewis (M, UK)" },
        ];

        async function loadVoices() {
            const select = document.getElementById('voice-select');
            function populateVoices(voices) {
                select.innerHTML = '';
                for (const v of voices) {
                    const opt = document.createElement('option');
                    opt.value = v.id;
                    opt.textContent = v.name;
                    select.appendChild(opt);
                }
            }
            try {
                const res = await fetch('/api/voices');
                const data = await res.json();
                const voices = data.voices || [];
                populateVoices(voices.length > 0 ? voices : COMMON_VOICES);
            } catch (e) {
                populateVoices(COMMON_VOICES);
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) saveProgress();
        });
        window.addEventListener('beforeunload', saveProgress);

        // --- Init ---

        loadVoices();
        loadItems().then(() => {
            const hasProcessing = items.some(i => i.status === 'processing' || i.status === 'queued');
            if (hasProcessing) {
                pollUpdates();
            }
        });

        // Init speed button label
        const initSpeed = getStoredSpeed();
        document.getElementById('speed-btn').textContent = initSpeed === 1 ? '1x' : initSpeed + 'x';
    </script>
</body>
</html>
