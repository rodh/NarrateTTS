services:
  tts-service:
    build: ./tts-service
    ports:
      - "8100:8100"
    volumes:
      - ./audio:/app/audio
    environment:
      - PYTHONUNBUFFERED=1
      - PIPER_MODELS_DIR=/app/models
      - TTS_VOICE=en_US-lessac-medium
      - TTS_OUTPUT_DIR=/app/audio

  narrate-tts:
    build: .
    ports:
      - "8090:8090"
    volumes:
      - ./audio:/app/audio
      - ./index.html:/app/index.html
    environment:
      - PYTHONUNBUFFERED=1
      - TTS_SERVICE_URL=http://tts-service:8100
